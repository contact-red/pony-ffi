name: Manually generate documentation

on:
  workflow_dispatch

permissions:
  contents: read
  pages: write
  id-token: write
  packages: read

concurrency:
  group: "update-documentation"
  cancel-in-progress: true

jobs:
  generate-documentation:
    name: Generate documentation for release
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/ponylang/library-documentation-action-v2:release
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
      - name: Generate documentation
        run: /entrypoint.py
        env:
          INPUT_SITE_URL: "https://pony-ffi.contact.red"
          INPUT_LIBRARY_NAME: "pony-ffi"
          INPUT_DOCS_BUILD_DIR: "build/pony-ffi-docs"
      - name: Apply custom theme
        run: cp -r docs-theme/assets/* build/pony-ffi-docs/docs/assets/
      - name: Rebuild site with custom theme
        run: cd build/pony-ffi-docs && mkdocs build
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'build/pony-ffi-docs/site/'
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
